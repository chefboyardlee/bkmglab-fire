<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — bkmgLab</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #fff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 100;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #e8e8e8;
        }
        .logo img { height: 28px; display: block; }
        nav { display: flex; gap: 32px; }
        nav a {
            font-size: 13px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 1.2px;
            transition: opacity 0.2s ease;
        }
        nav a:hover { opacity: 0.6; }
        nav a.active { border-bottom: 1.5px solid #1a1a1a; padding-bottom: 2px; }

        main {
            padding: 140px 40px 120px;
            max-width: 640px;
        }

        .page-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #999;
            margin-bottom: 60px;
        }

        .contact-intro {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 60px;
            color: #1a1a1a;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #999;
        }

        .form-group input,
        .form-group textarea {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 16px;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid #ddd;
            outline: none;
            background: transparent;
            color: #1a1a1a;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-bottom-color: #1a1a1a;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #ccc;
        }

        .submit-btn {
            align-self: flex-start;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 14px 48px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: transparent;
            color: #1a1a1a;
        }

        .contact-email {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid #e8e8e8;
        }

        .contact-email p {
            font-size: 12px;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .contact-email a {
            font-size: 18px;
            color: #1a1a1a;
            border-bottom: 1px solid #ddd;
            padding-bottom: 2px;
            transition: border-color 0.3s ease;
        }

        .contact-email a:hover {
            border-bottom-color: #1a1a1a;
        }

        footer {
            padding: 60px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-top: 1px solid #e8e8e8;
        }
        .footer-left p { font-size: 12px; color: #999; letter-spacing: 0.5px; }
        .footer-right { display: flex; gap: 32px; }
        .footer-right a {
            font-size: 12px; text-transform: uppercase;
            letter-spacing: 1px; color: #999; transition: color 0.2s ease;
        }
        .footer-right a:hover { color: #1a1a1a; }

        @media (max-width: 768px) {
            header { padding: 16px 20px; }
            .logo img { height: 22px; }
            nav { gap: 20px; }
            nav a { font-size: 11px; }
            main { padding: 120px 20px 80px; }
            .contact-intro { font-size: 20px; }
            footer { flex-direction: column; gap: 24px; padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="bkmgLab">
        </a>
        <nav>
            <a href="shop.html">Shop</a>
            <a href="archive.html">Archive</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <p class="page-title">문의하기</p>
        <p class="contact-intro">제품 문의, 협업 제안, 그 외 무엇이든 —<br>편하게 연락주세요.</p>

        <form class="contact-form" action="https://formspree.io/f/xojpgnon" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="subject">제목</label>
                <input type="text" id="subject" name="subject" placeholder="어떤 내용인가요?">
            </div>
            <div class="form-group">
                <label for="message">내용</label>
                <textarea id="message" name="message" placeholder="메시지를 입력해주세요..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">보내기</button>
        </form>

        <div class="contact-email">
            <p>직접 연락</p>
            <a href="mailto:info@bkmglab.com">info@bkmglab.com</a>
        </div>
    </main>

    <footer>
        <div class="footer-left">
            <p>&copy; 2026 bkmgLab. All rights reserved.</p>
        </div>
        <div class="footer-right">
            <a href="shop.html">Shop</a>
            <a href="archive.html">Archive</a>
            <a href="contact.html">Contact</a>
        </div>
    </footer>

</body>
</html>
