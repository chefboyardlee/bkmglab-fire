<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — bkmgLab</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #fff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 100;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #e8e8e8;
        }
        .logo img { height: 28px; display: block; }
        nav { display: flex; gap: 32px; }
        nav a {
            font-size: 13px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 1.2px;
            transition: opacity 0.2s ease;
        }
        nav a:hover { opacity: 0.6; }
        nav a.active { border-bottom: 1.5px solid #1a1a1a; padding-bottom: 2px; }

        main { padding: 140px 40px 120px; }

        .page-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #999;
            margin-bottom: 60px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product-card {
            cursor: pointer;
        }

        .product-image {
            aspect-ratio: 3/4;
            background: #f0f0f0;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .product-image img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.03);
        }

        .product-name {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .product-price {
            font-size: 13px;
            color: #777;
            margin-top: 4px;
        }

        footer {
            padding: 60px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-top: 1px solid #e8e8e8;
        }
        .footer-left p { font-size: 12px; color: #999; letter-spacing: 0.5px; }
        .footer-right { display: flex; gap: 32px; }
        .footer-right a {
            font-size: 12px; text-transform: uppercase;
            letter-spacing: 1px; color: #999; transition: color 0.2s ease;
        }
        .footer-right a:hover { color: #1a1a1a; }

        @media (max-width: 768px) {
            header { padding: 16px 20px; }
            .logo img { height: 22px; }
            nav { gap: 20px; }
            nav a { font-size: 11px; }
            main { padding: 120px 20px 80px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            footer { flex-direction: column; gap: 24px; padding: 40px 20px; }
        }
    </style>
</head>
